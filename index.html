<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Kindle Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="dashboard">
    <div id="top-panel">
      <div id="clock-panel" class="top-cell">
        <div id="time">00:00</div>
        <div id="date">Loading...</div>
        <div id="lunar">Lunar date loading...</div>
      </div>
      <div id="weather-panel" class="top-cell">
        <div id="city">Wellington</div>
        <div id="temperature">--°C</div>
        <div id="condition">Loading...</div>
        <div id="weather-meta">Humidity -- &nbsp; Wind --</div>
        <div id="sun">Sunrise -- &nbsp; Sunset --</div>
      </div>
    </div>

    <div id="forecast-panel">
      <div id="forecast-row">
        <div class="forecast-day">Loading forecast...</div>
      </div>
    </div>

    <div id="calendar-panel">
      <div id="month-title">Month</div>
      <table id="calendar" aria-label="Monthly calendar"></table>
    </div>

    <div id="footer">Updated --</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
