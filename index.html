<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kindle Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <div class="top-row">
      <div class="clock-panel">
        <div id="time" class="time">--:--</div>
        <div id="date" class="date">Starting...</div>
      </div>
      <div class="weather-panel">
        <div class="city">Wellington</div>
        <div id="temperature" class="temperature">--&deg;C</div>
        <div id="condition" class="condition">Loading weather...</div>
        <div id="humidity" class="meta">Humidity: --</div>
        <div id="wind" class="meta">Wind: --</div>
      </div>
    </div>

    <div class="forecast-section">
      <div id="forecast-row" class="forecast-row">
        <div class="forecast-day">Loading forecast...</div>
      </div>
    </div>

    <div class="calendar-section">
      <div id="month-title" class="month-title">Calendar</div>
      <table id="calendar" class="calendar"></table>
    </div>

    <div id="updated" class="updated">Weather update pending</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
